apiVersion: v1
kind: Secret
metadata:
  name: pr-agent-secrets
  namespace: pr-agent
type: Opaque
stringData:
  # Database credentials
  DATABASE_USER: "pragent_user"
  DATABASE_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # API Keys
  OPENAI_API_KEY: "CHANGE_ME_IN_PRODUCTION"
  GITHUB_TOKEN: "CHANGE_ME_IN_PRODUCTION"
  GITHUB_WEBHOOK_SECRET: "CHANGE_ME_IN_PRODUCTION"
  
  # Security keys
  ENCRYPTION_KEY: "CHANGE_ME_IN_PRODUCTION"
  API_SIGNATURE_SECRET: "CHANGE_ME_IN_PRODUCTION"
  
  # Database connection string
  DATABASE_URL: "postgresql://pragent_user:CHANGE_ME_IN_PRODUCTION@postgres:5432/pragent"
  REDIS_URL: "redis://redis:6379"

---
apiVersion: v1
kind: Secret
metadata:
  name: docker-registry
  namespace: pr-agent
type: kubernetes.io/dockercfg
data:
  .dockercfg: |
    {
      "CHANGE_ME_REGISTRY_URL": {
        "auth": "CHANGE_ME_BASE64_ENCODED_CREDENTIALS",
        "email": "CHANGE_ME_EMAIL"
      }
    }
