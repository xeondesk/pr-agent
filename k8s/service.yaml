apiVersion: v1
kind: Service
metadata:
  name: pr-agent-service
  namespace: pr-agent
  labels:
    app: pr-agent
spec:
  type: ClusterIP
  selector:
    app: pr-agent
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pr-agent-network-policy
  namespace: pr-agent
spec:
  podSelector:
    matchLabels:
      app: pr-agent
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 3000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pr-agent-ingress
  namespace: pr-agent
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - pr-agent.example.com
    secretName: pr-agent-tls
  rules:
  - host: pr-agent.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pr-agent-service
            port:
              number: 80

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pr-agent
  namespace: pr-agent

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pr-agent-role
  namespace: pr-agent
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pr-agent-rolebinding
  namespace: pr-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pr-agent-role
subjects:
- kind: ServiceAccount
  name: pr-agent
  namespace: pr-agent
