apiVersion: v1
kind: ConfigMap
metadata:
  name: pr-agent-config
  namespace: pr-agent
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  NEXT_PUBLIC_APP_URL: "https://pr-agent.example.com"
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "pragent"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "60"
  ENABLE_WEBHOOKS: "true"
  ENABLE_RATE_LIMITING: "true"
