version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pr-agent-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-pruser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-prpassword}
      POSTGRES_DB: ${DB_NAME:-pragent}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/web/lib/db.migrations.sql:/docker-entrypoint-initdb.d/01-schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pruser} -d ${DB_NAME:-pragent}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pr-agent-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pr-agent-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pr-agent-network

  # Next.js Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: pr-agent-app
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${DB_USER:-pruser}:${DB_PASSWORD:-prpassword}@postgres:5432/${DB_NAME:-pragent}
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      API_SIGNATURE_SECRET: ${API_SIGNATURE_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pr-agent-network

  # Database Admin UI (optional)
  adminer:
    image: adminer:latest
    container_name: pr-agent-adminer
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - pr-agent-network

  # Redis Commander (optional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: pr-agent-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - pr-agent-network

volumes:
  postgres_data:
  redis_data:

networks:
  pr-agent-network:
    driver: bridge
